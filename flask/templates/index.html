<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Traffic Volume Estimation</title>
    <style>
        body {
            background-image: url("https://cdn.vox-cdn.com/thumbor/voARJfEKvTp6iMSzW3ExPn06TDM=/0x78:3000x1766/1600x900/cdn.vox-cdn.com/uploads/chorus_image/image/44219366/72499026.0.0.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: black;
            font-family: Arial, sans-serif;
        }
        .login {
            background-color: rgba(255, 255, 255, 0.85);
            max-width: 500px;
            margin: 30px auto;
            padding: 30px;
            border-radius: 10px;
        }
        label {
            display: inline-block;
            width: 90px;
            font-weight: bold;
        }
        input, select {
            margin-bottom: 10px;
        }
        .result {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>
<div class="login">
    <h1 style="text-align:center;">Traffic Volume Estimation</h1>

    <form action="{{ url_for('predict') }}" method="post">
        <h2>Please enter the following details:</h2>

        <label for="holiday">Holiday:</label>
        <select id="holiday" name="holiday">
            <option value="">None</option>
            <option value="Columbus Day">Columbus Day</option>
            <option value="Veterans Day">Veterans Day</option>
            <option value="Thanksgiving Day">Thanksgiving Day</option>
            <option value="Christmas Day">Christmas Day</option>
            <option value="New Years Day">New Years Day</option>
            <option value="Washingtons Birthday">Washington's Birthday</option>
            <option value="Independence Day">Independence Day</option>
            <option value="Labor Day">Labor Day</option>
            <option value="State Fair">State Fair</option>
            <option value="Memorial Day">Memorial Day</option>
            <option value="Martin Luther King Jr Day">Martin Luther King Jr Day</option>
        </select><br>

        <label>temp:</label>
        <input type="number" name="temp" placeholder="temp" required /><br>

        <label>rain:</label>
        <input type="number" min="0" name="rain" placeholder="rain" required /><br>

        <label>snow:</label>
        <input type="number" min="0" name="snow" placeholder="snow" required /><br>

        <label for="weather">weather:</label>
        <select id="weather" name="weather">
            <option value="" disabled selected>None</option>
            <option value='Clouds'>Clouds</option>
            <option value='Clear'>Clear</option>
            <option value='Rain'>Rain</option>
            <option value='Drizzle'>Drizzle</option>
            <option value='Mist'>Mist</option>
            <option value='Fog'>Fog</option>
            <option value='Thunderstorm'>Thunderstorm</option>
            <option value='Haze'>Haze</option>
            <option value='Squall'>Squall</option>
            <option value='Smoke'>Smoke</option>
            <option value='Snow'>Snow</option>
        </select><br>

        <label>year:</label>
        <input type="number" min="2012" max="2050" name="year" placeholder="year" required /><br>

        <label>month:</label>
        <input type="number" min="1" max="12" name="month" placeholder="month" required /><br>

        <label>day:</label>
        <input type="number" min="1" max="31" name="day" placeholder="day" required /><br>

        <label>hours:</label>
        <input type="number" min="0" max="23" name="hours" placeholder="hours" required /><br>

        <label>minutes:</label>
        <input type="number" min="0" max="59" name="minutes" placeholder="minutes" required /><br>

        <label>seconds:</label>
        <input type="number" min="0" max="59" name="seconds" placeholder="seconds" required /><br>

        <br>
        <button type="submit" style="height:30px; width:200px;">Predict</button>
    </form>

    <br>

    <div class="result">
        {{ prediction_text }}
    </div>

    {% if result %}
    <img src="{{ result }}" alt="Result Image" height="198" width="222" onerror="this.style.display='none'" />
    {% endif %}
</div>
</body>
</html>
